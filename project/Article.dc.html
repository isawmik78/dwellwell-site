<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>

<div style="font-family:'Inter',system-ui,sans-serif;color:#101E31;">

  <!-- COVER (Dark Field, motif 2.8.B) -->
  <section data-screen-label="Article cover" style="position:relative;background:#101E31;overflow:hidden;min-height:clamp(360px,42vw,460px);display:flex;flex-direction:column;justify-content:center;padding:clamp(56px,8vw,96px) 0 clamp(64px,9vw,104px);">
    <svg viewBox="0 0 1440 720" preserveAspectRatio="xMidYMid slice" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;">
      <g transform="translate(-176.18,-434.30) scale(3.1)">
        <path d="M190.95,391.71 L289.09,216.80 L387.22,391.71" fill="none" stroke="#F2F4F7" stroke-opacity="0.05" stroke-width="29" stroke-linejoin="miter" stroke-linecap="square"></path>
      </g>
    </svg>
    <div style="position:relative;z-index:2;max-width:820px;width:100%;margin:0 auto;padding:0 clamp(20px,5vw,40px);">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <span style="width:24px;height:1px;background:#4A8BB5;"></span>
        <a href="Resources.dc.html" style="font-weight:500;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#D8E0EA;text-decoration:none;border-bottom:1px solid transparent;padding-bottom:1px;" style-hover="border-color:#4A8BB5;">{{ category }}</a>
      </div>
      <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:clamp(32px,5.2vw,48px);line-height:1.16;color:#F2F4F7;margin:0;max-width:22ch;">{{ title }}</h1>
    </div>
    <div style="position:absolute;left:0;right:0;bottom:0;z-index:2;">
      <div style="height:1px;background:#4A8BB5;"></div>
      <div style="height:18px;background:#F2F4F7;"></div>
    </div>
  </section>

  <main style="background:#F2F4F7;">
    <article style="max-width:820px;margin:0 auto;padding:clamp(48px,7vw,80px) clamp(20px,5vw,40px) clamp(40px,6vw,56px);">
      <p style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:clamp(22px,3vw,28px);line-height:1.32;color:#101E31;margin:0 0 14px;max-width:40ch;">{{ dek }}</p>
      <div style="height:0.5px;background:#D8E0EA;margin:28px 0 36px;"></div>

      <sc-for list="{{ blocks }}" as="b" hint-placeholder-count="5">
        <sc-if value="{{ b.isH2 }}" hint-placeholder-val="{{ false }}">
          <h2 style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:clamp(26px,3.6vw,32px);line-height:1.22;color:#101E31;margin:40px 0 14px;max-width:30ch;">{{ b.text }}</h2>
        </sc-if>
        <sc-if value="{{ b.isP }}" hint-placeholder-val="{{ true }}">
          <p style="font-size:17px;line-height:1.68;color:#101E31;margin:0 0 20px;max-width:72ch;">{{ b.text }}</p>
        </sc-if>
        <sc-if value="{{ b.isUl }}" hint-placeholder-val="{{ false }}">
          <ul style="list-style:none;margin:0 0 24px;padding:0;display:flex;flex-direction:column;gap:2px;max-width:72ch;">
            <sc-for list="{{ b.items }}" as="it" hint-placeholder-count="4">
              <li style="display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid #D8E0EA;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#4A8BB5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-top:4px;flex:0 0 auto;"><path d="M5 12.5 10 17.5 19 6.5"></path></svg>
                <span style="font-size:16px;line-height:1.55;color:#101E31;">{{ it }}</span>
              </li>
            </sc-for>
          </ul>
        </sc-if>
        <sc-if value="{{ b.isCallout }}" hint-placeholder-val="{{ false }}">
          <div style="border:0.5px solid #4A8BB5;border-radius:8px;padding:22px 24px;margin:8px 0 24px;max-width:72ch;">
            <p style="font-size:16px;line-height:1.6;color:#101E31;margin:0;">{{ b.text }}</p>
          </div>
        </sc-if>
      </sc-for>

      <!-- Related -->
      <sc-if value="{{ hasRelated }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top:48px;padding-top:32px;border-top:0.5px solid #D8E0EA;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
            <span style="width:24px;height:1px;background:#4A8BB5;"></span>
            <span style="font-weight:500;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#57657A;">More from Resources</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <sc-for list="{{ related }}" as="r" hint-placeholder-count="2">
              <a href="{{ r.href }}" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:#F2F4F7;border:1px solid #D8E0EA;border-radius:8px;text-decoration:none;transition:border-color .15s;" style-hover="border-color:#4A8BB5;" style-focus="outline:2px solid #4A8BB5;outline-offset:2px;">
                <span style="font-weight:600;font-size:16px;letter-spacing:-0.01em;color:#101E31;">{{ r.title }}</span>
                <span style="font-weight:500;font-size:14px;color:#3A6E91;flex:0 0 auto;">Read →</span>
              </a>
            </sc-for>
          </div>
        </div>
      </sc-if>
    </article>
  </main>

  <!-- CTA band -->
  <section data-screen-label="Article CTA" style="background:#F2F4F7;border-top:1px solid #4A8BB5;">
    <div style="max-width:1248px;margin:0 auto;padding:clamp(48px,8vw,80px) clamp(20px,5vw,96px);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:28px;">
      <p style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:clamp(26px,3.8vw,36px);line-height:1.2;color:#101E31;margin:0;max-width:22ch;">Have a property that needs this handled?</p>
      <div style="display:flex;flex-wrap:wrap;gap:14px;">
        <a href="#" style="font-weight:500;font-size:14px;letter-spacing:0.02em;color:#F2F4F7;background:#101E31;padding:12px 26px;border-radius:4px;text-decoration:none;white-space:nowrap;transition:opacity .15s;" style-hover="opacity:0.9;" style-focus="outline:2px solid #4A8BB5;outline-offset:2px;">Start a conversation</a>
        <a href="#" style="font-weight:500;font-size:14px;letter-spacing:0.02em;color:#3A6E91;background:transparent;border:1px solid #4A8BB5;padding:12px 26px;border-radius:4px;text-decoration:none;white-space:nowrap;transition:background .15s;" style-hover="background:rgba(74,139,181,0.1);" style-focus="outline:2px solid #4A8BB5;outline-offset:2px;">Request service</a>
      </div>
    </div>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:1200},&quot;category&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Residential maintenance&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Article title&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dek&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;blocks&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;Array&lt;{t:string;c:string|string[]}&gt;&quot;},&quot;related&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;Array&lt;{title:string;href:string}&gt;&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.blocks || [];
    const blocks = raw.map(b => ({
      isH2: b.t === 'h2',
      isP: b.t === 'p',
      isUl: b.t === 'ul',
      isCallout: b.t === 'callout',
      text: typeof b.c === 'string' ? b.c : '',
      items: Array.isArray(b.c) ? b.c : []
    }));
    const related = this.props.related || [];
    return {
      category: this.props.category || 'Resources',
      title: this.props.title || '',
      dek: this.props.dek || '',
      blocks,
      related,
      hasRelated: related.length > 0
    };
  }
}
</script>
</body>
</html>
