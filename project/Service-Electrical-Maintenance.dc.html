<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:#F2F4F7;}
    ::selection{background:#4A8BB5;color:#F2F4F7;}
  </style>
</helmet>

<!-- GATED: built but not published. Not linked from Residential overview, nav, or footer. Do not name in residential copy until cleared. -->
<div style="background:#F2F4F7;min-height:100vh;position:relative;overflow-x:hidden;">
  <dc-import name="SiteNav" active="services" hint-size="100%,72px"></dc-import>
  <dc-import name="ServiceDetail"
    svc-name="{{ svcName }}" descr="{{ descr }}" who-needs="{{ whoNeeds }}"
    line-label="{{ lineLabel }}" line-href="{{ lineHref }}" includes="{{ includes }}"
    hint-size="100%,1000px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      svcName: "Electrical Maintenance & Repairs",
      lineLabel: "Residential maintenance",
      lineHref: "Residential-Maintenance.dc.html",
      descr: "Coordinated electrical maintenance and repair for residential property, carried out by licensed trades. DwellWell coordinates the work and documents it from intake to closeout.",
      whoNeeds: "Homeowners, landlords, and property managers who need electrical work handled by licensed trades.",
      includes: ["Fixture and outlet repair","Switch and panel service","Diagnostics and troubleshooting","Code-aware repairs","Licensed-trade coordination","Documented closeout record"]
    };
  }
}
</script>
</body>
</html>
