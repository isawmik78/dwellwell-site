<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:#F2F4F7;}
    ::selection{background:#4A8BB5;color:#F2F4F7;}
  </style>
</helmet>

<div style="background:#F2F4F7;min-height:100vh;position:relative;overflow-x:hidden;">
  <dc-import name="SiteNav" active="services" hint-size="100%,72px"></dc-import>
  <dc-import name="ServiceDetail"
    svc-name="{{ svcName }}" descr="{{ descr }}" who-needs="{{ whoNeeds }}"
    line-label="{{ lineLabel }}" line-href="{{ lineHref }}" includes="{{ includes }}"
    hint-size="100%,1000px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      svcName: "Property Repairs",
      lineLabel: "Property preservation",
      lineHref: "Property-Preservation.dc.html",
      descr: "Repairs that protect and preserve the condition of vacant assets. DwellWell coordinates the repair work needed to keep property in stable, marketable condition. Every job is documented and closed with a complete record.",
      whoNeeds: "Lenders, investors, and asset managers who need vacant or REO property repaired and the work documented.",
      includes: ["Structural and surface repairs","Roof and exterior repairs","Plumbing and basic systems","Damage mitigation","Before and after photos","Documented closeout record"]
    };
  }
}
</script>
</body>
</html>
