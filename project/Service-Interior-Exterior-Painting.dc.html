<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:#F2F4F7;}
    ::selection{background:#4A8BB5;color:#F2F4F7;}
  </style>
</helmet>

<div style="background:#F2F4F7;min-height:100vh;position:relative;overflow-x:hidden;">
  <dc-import name="SiteNav" active="services" hint-size="100%,72px"></dc-import>
  <dc-import name="ServiceDetail"
    svc-name="{{ svcName }}" descr="{{ descr }}" who-needs="{{ whoNeeds }}"
    line-label="{{ lineLabel }}" line-href="{{ lineHref }}" includes="{{ includes }}"
    hint-size="100%,1000px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,440px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      svcName: "Interior & Exterior Painting",
      lineLabel: "Residential maintenance",
      lineHref: "Residential-Maintenance.dc.html",
      descr: "Painting and surface refinishing for residential property, inside and out. DwellWell coordinates touch-ups, full repaints, and exterior work on homes, fences, and structures. Every job is managed and documented to closeout.",
      whoNeeds: "Homeowners, landlords, and property managers preparing units, refreshing interiors, or protecting exterior surfaces on residential property.",
      includes: ["Interior touch-ups and repaints","Exterior house painting","Fences and outbuildings","Surface preparation","Surface refinishing","Color and finish coordination"]
    };
  }
}
</script>
</body>
</html>
